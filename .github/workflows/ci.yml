name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  COVERAGE_THRESHOLD: 80
  CRITICAL_COVERAGE_THRESHOLD: 95

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        env:
          NODE_OPTIONS: '--no-warnings'
          NEXT_PUBLIC_APP_URL: 'https://www.sim.ai'
          ENCRYPTION_KEY: '7cf672e460e430c1fba707575c2b0e2ad5a99dddf9b7b7e3b5646e630861db1c' # dummy key for CI only
        run: |
          echo "🧪 Running comprehensive test suite with coverage..."
          bun run test:coverage
          echo "✅ Test execution completed"

      - name: Coverage analysis and quality gates
        run: |
          cd apps/sim
          echo "📊 Analyzing test coverage results..."
          
          # Check if coverage data exists
          if [ ! -f "coverage/coverage-final.json" ]; then
            echo "❌ Coverage data not found - tests may have failed"
            exit 1
          fi
          
          # Extract coverage metrics using Node.js
          node -e "
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
            
            let totalLines = 0, coveredLines = 0;
            let totalFunctions = 0, coveredFunctions = 0;
            let totalStatements = 0, coveredStatements = 0;
            let totalBranches = 0, coveredBranches = 0;
            
            Object.values(coverage).forEach(file => {
              totalLines += Object.keys(file.l || {}).length;
              coveredLines += Object.values(file.l || {}).filter(x => x > 0).length;
              totalFunctions += Object.keys(file.f || {}).length;
              coveredFunctions += Object.values(file.f || {}).filter(x => x > 0).length;
              totalStatements += Object.keys(file.s || {}).length;
              coveredStatements += Object.values(file.s || {}).filter(x => x > 0).length;
              totalBranches += Object.keys(file.b || {}).length * 2;
              const branchData = Object.values(file.b || {});
              coveredBranches += branchData.reduce((acc, branch) => acc + branch.filter(x => x > 0).length, 0);
            });
            
            const linesCoverage = totalLines ? (coveredLines / totalLines * 100).toFixed(2) : '0.00';
            const functionsCoverage = totalFunctions ? (coveredFunctions / totalFunctions * 100).toFixed(2) : '0.00';
            const statementsCoverage = totalStatements ? (coveredStatements / totalStatements * 100).toFixed(2) : '0.00';
            const branchesCoverage = totalBranches ? (coveredBranches / totalBranches * 100).toFixed(2) : '0.00';
            const overallCoverage = ((parseFloat(linesCoverage) + parseFloat(functionsCoverage) + parseFloat(statementsCoverage) + parseFloat(branchesCoverage)) / 4).toFixed(2);
            
            console.log('📈 Coverage Results:');
            console.log(\`  Lines: \${linesCoverage}% (\${coveredLines}/\${totalLines})\`);
            console.log(\`  Functions: \${functionsCoverage}% (\${coveredFunctions}/\${totalFunctions})\`);
            console.log(\`  Statements: \${statementsCoverage}% (\${coveredStatements}/\${totalStatements})\`);
            console.log(\`  Branches: \${branchesCoverage}% (\${coveredBranches}/\${totalBranches})\`);
            console.log(\`  Overall: \${overallCoverage}%\`);
            
            // Export metrics for quality gate check
            console.log(\`\nExporting metrics...\`);
            console.log(\`OVERALL_COVERAGE=\${overallCoverage}\`);
            console.log(\`LINES_COVERAGE=\${linesCoverage}\`);
            console.log(\`FUNCTIONS_COVERAGE=\${functionsCoverage}\`);
            console.log(\`STATEMENTS_COVERAGE=\${statementsCoverage}\`);
            console.log(\`BRANCHES_COVERAGE=\${branchesCoverage}\`);
            
            // Create summary for GitHub
            const summary = \`## 📊 Test Coverage Report
            
            | Metric | Coverage | Status |
            |--------|----------|---------|
            | Lines | \${linesCoverage}% | \${parseFloat(linesCoverage) >= 80 ? '✅' : '❌'} |
            | Functions | \${functionsCoverage}% | \${parseFloat(functionsCoverage) >= 80 ? '✅' : '❌'} |
            | Statements | \${statementsCoverage}% | \${parseFloat(statementsCoverage) >= 80 ? '✅' : '❌'} |
            | Branches | \${branchesCoverage}% | \${parseFloat(branchesCoverage) >= 80 ? '✅' : '❌'} |
            | **Overall** | **\${overallCoverage}%** | **\${parseFloat(overallCoverage) >= 80 ? '✅ Pass' : '❌ Fail'}** |
            
            ### Quality Gate: \${parseFloat(overallCoverage) >= 80 ? '✅ PASSED' : '❌ FAILED'}
            - Target: 80%+ coverage
            - Result: \${overallCoverage}% coverage
            \`;
            
            fs.writeFileSync('coverage/github-summary.md', summary);
            
            // Check quality gate
            if (parseFloat(overallCoverage) < 80) {
              console.error('❌ QUALITY GATE FAILED: Coverage below 80% threshold');
              process.exit(1);
            } else {
              console.log('✅ QUALITY GATE PASSED: Coverage meets requirements');
            }
          " >> $GITHUB_ENV

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ github.run_number }}
          path: |
            apps/sim/coverage/
          retention-days: 30

      - name: Build application
        env:
          NODE_OPTIONS: '--no-warnings'
          NEXT_PUBLIC_APP_URL: 'https://www.sim.ai'
          STRIPE_SECRET_KEY: 'dummy_key_for_ci_only'
          STRIPE_WEBHOOK_SECRET: 'dummy_secret_for_ci_only'
          RESEND_API_KEY: 'dummy_key_for_ci_only'
          AWS_REGION: 'us-west-2'
          ENCRYPTION_KEY: '7cf672e460e430c1fba707575c2b0e2ad5a99dddf9b7b7e3b5646e630861db1c' # dummy key for CI only
        run: bun run build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: ./apps/sim/coverage
          fail_ci_if_error: false
          verbose: true

  migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Apply migrations
        working-directory: ./apps/sim
        env:
          DATABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.DATABASE_URL || secrets.STAGING_DATABASE_URL }}
        run: bunx drizzle-kit migrate
