name: Marketplace CI/CD Pipeline

on:
  push:
    branches: [main, staging]
    paths: 
      - 'apps/sim/lib/integrations/marketplace-**'
      - 'apps/sim/app/api/marketplace/**'
      - 'apps/sim/components/marketplace/**'
      - '.github/workflows/marketplace-ci.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'apps/sim/lib/integrations/marketplace-**'
      - 'apps/sim/app/api/marketplace/**'
      - 'apps/sim/components/marketplace/**'
      - '.github/workflows/marketplace-ci.yml'

concurrency:
  group: marketplace-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  MARKETPLACE_COVERAGE_THRESHOLD: 85
  SECURITY_SCAN_THRESHOLD: 80
  PERFORMANCE_THRESHOLD: 2000 # 2 seconds max response time

jobs:
  marketplace-security-scan:
    name: 🔒 Marketplace Security Scan
    runs-on: ubuntu-latest
    outputs:
      security-passed: ${{ steps.security-gate.outputs.passed }}
      risk-score: ${{ steps.security-gate.outputs.risk-score }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run marketplace security scanners
        id: security-scan
        env:
          NODE_OPTIONS: '--no-warnings'
        run: |
          echo "🔒 Running marketplace security scanners..."
          cd apps/sim
          
          # Create security scan results directory
          mkdir -p security-reports
          
          # Run static code analysis on marketplace files
          echo "📊 Static code analysis..."
          bun run security:static-analysis \
            --target="lib/integrations/marketplace-*" \
            --output="security-reports/static-analysis.json" \
            --format="sarif" || true
          
          # Run dependency vulnerability check
          echo "🔍 Dependency vulnerability scan..."
          bun run security:dependencies \
            --output="security-reports/dependencies.json" \
            --severity="medium,high,critical" || true
          
          # Run secrets detection
          echo "🕵️ Secrets detection scan..."
          bun run security:secrets \
            --target="lib/integrations/marketplace-*" \
            --output="security-reports/secrets.json" || true
          
          # Custom marketplace-specific security checks
          echo "🛡️ Marketplace-specific security checks..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const glob = require('glob');
            
            console.log('Running marketplace security validation...');
            
            const marketplaceFiles = glob.sync('lib/integrations/marketplace-*.ts');
            let riskScore = 0;
            let findings = [];
            
            for (const file of marketplaceFiles) {
              const content = fs.readFileSync(file, 'utf8');
              
              // Check for potential security issues
              const securityPatterns = [
                { pattern: /eval\s*\(/, risk: 90, message: 'Use of eval() detected' },
                { pattern: /Function\s*\(/, risk: 80, message: 'Dynamic function creation detected' },
                { pattern: /dangerouslySetInnerHTML/, risk: 70, message: 'XSS vulnerability potential' },
                { pattern: /process\.env\s*\[.*\]/, risk: 30, message: 'Dynamic environment access' },
                { pattern: /require\s*\(.*\+/, risk: 60, message: 'Dynamic require detected' },
                { pattern: /exec\s*\(/, risk: 85, message: 'Command execution detected' },
                { pattern: /spawn\s*\(/, risk: 85, message: 'Process spawning detected' }
              ];
              
              for (const check of securityPatterns) {
                const matches = content.match(check.pattern);
                if (matches) {
                  findings.push({
                    file,
                    pattern: check.pattern.toString(),
                    risk: check.risk,
                    message: check.message,
                    matches: matches.length
                  });
                  riskScore = Math.max(riskScore, check.risk);
                }
              }
            }
            
            // Generate security report
            const securityReport = {
              timestamp: new Date().toISOString(),
              riskScore,
              findings,
              passed: riskScore < 80,
              filesScanned: marketplaceFiles.length,
              summary: {
                critical: findings.filter(f => f.risk >= 90).length,
                high: findings.filter(f => f.risk >= 80 && f.risk < 90).length,
                medium: findings.filter(f => f.risk >= 50 && f.risk < 80).length,
                low: findings.filter(f => f.risk < 50).length
              }
            };
            
            fs.writeFileSync('security-reports/marketplace-scan.json', JSON.stringify(securityReport, null, 2));
            
            console.log(\`Security scan completed: Risk Score \${riskScore}/100\`);
            console.log(\`Findings: \${findings.length} security issues detected\`);
            console.log(\`Status: \${securityReport.passed ? 'PASSED' : 'FAILED'}\`);
            
            // Export results for next steps
            console.log(\`RISK_SCORE=\${riskScore}\`);
            console.log(\`SECURITY_PASSED=\${securityReport.passed}\`);
            console.log(\`FINDINGS_COUNT=\${findings.length}\`);
          " >> $GITHUB_ENV

      - name: Security quality gate
        id: security-gate
        run: |
          cd apps/sim
          echo "🚪 Evaluating security quality gate..."
          
          RISK_SCORE=$(grep "RISK_SCORE=" $GITHUB_ENV | cut -d'=' -f2)
          SECURITY_PASSED=$(grep "SECURITY_PASSED=" $GITHUB_ENV | cut -d'=' -f2)
          
          echo "risk-score=$RISK_SCORE" >> $GITHUB_OUTPUT
          echo "passed=$SECURITY_PASSED" >> $GITHUB_OUTPUT
          
          if [ "$SECURITY_PASSED" = "true" ]; then
            echo "✅ Security quality gate PASSED (Risk Score: $RISK_SCORE/100)"
          else
            echo "❌ Security quality gate FAILED (Risk Score: $RISK_SCORE/100)"
            echo "🔒 Please address security findings before deployment"
            exit 1
          fi

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marketplace-security-report-${{ github.run_number }}
          path: apps/sim/security-reports/
          retention-days: 30

  marketplace-tests:
    name: 🧪 Marketplace Testing Suite
    runs-on: ubuntu-latest
    needs: marketplace-security-scan
    if: needs.marketplace-security-scan.outputs.security-passed == 'true'
    
    strategy:
      fail-fast: false
      matrix:
        test-suite: [
          'unit',
          'integration',
          'api',
          'workflow',
          'performance'
        ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup test environment
        env:
          NODE_OPTIONS: '--no-warnings'
          NEXT_PUBLIC_APP_URL: 'https://test.sim.ai'
          ENCRYPTION_KEY: '7cf672e460e430c1fba707575c2b0e2ad5a99dddf9b7b7e3b5646e630861db1c'
        run: |
          echo "🔧 Setting up test environment for ${{ matrix.test-suite }} tests..."
          cd apps/sim
          
          # Create test directories
          mkdir -p test-results/${{ matrix.test-suite }}
          mkdir -p test-artifacts/${{ matrix.test-suite }}
          
          # Setup test database if needed for integration tests
          if [ "${{ matrix.test-suite }}" = "integration" ]; then
            echo "🗃️ Setting up test database..."
            # Database setup would go here
          fi
          
          # Setup browser for E2E tests if needed
          if [ "${{ matrix.test-suite }}" = "workflow" ]; then
            echo "🌐 Setting up browser for workflow tests..."
            npx playwright install chromium
          fi

      - name: Run marketplace test suite - ${{ matrix.test-suite }}
        env:
          NODE_OPTIONS: '--no-warnings'
          TEST_SUITE: ${{ matrix.test-suite }}
          CI_RUN_ID: ${{ github.run_number }}
        run: |
          cd apps/sim
          echo "🧪 Running ${{ matrix.test-suite }} tests for marketplace..."
          
          case "${{ matrix.test-suite }}" in
            "unit")
              echo "📝 Running unit tests..."
              bun test \
                --coverage \
                --reporter=junit \
                --testNamePattern="marketplace.*unit" \
                --outputFile=test-results/unit/junit.xml \
                lib/integrations/marketplace-*.test.ts
              ;;
            "integration")
              echo "🔗 Running integration tests..."
              bun test \
                --coverage \
                --reporter=junit \
                --testNamePattern="marketplace.*integration" \
                --outputFile=test-results/integration/junit.xml \
                lib/integrations/marketplace-*integration.test.ts
              ;;
            "api")
              echo "🌐 Running API endpoint tests..."
              bun run test:api \
                --pattern="marketplace" \
                --reporter=junit \
                --outputFile=test-results/api/junit.xml
              ;;
            "workflow")
              echo "⚡ Running workflow integration tests..."
              bun run test:workflow \
                --pattern="marketplace" \
                --browser=chromium \
                --headless \
                --reporter=junit \
                --outputFile=test-results/workflow/junit.xml
              ;;
            "performance")
              echo "🚀 Running performance tests..."
              bun run test:performance \
                --pattern="marketplace" \
                --threshold=${{ env.PERFORMANCE_THRESHOLD }} \
                --reporter=junit \
                --outputFile=test-results/performance/junit.xml
              ;;
          esac

      - name: Analyze test results - ${{ matrix.test-suite }}
        if: always()
        run: |
          cd apps/sim
          echo "📊 Analyzing ${{ matrix.test-suite }} test results..."
          
          # Check if test results exist
          if [ -f "test-results/${{ matrix.test-suite }}/junit.xml" ]; then
            echo "✅ Test results found for ${{ matrix.test-suite }}"
            
            # Parse test results
            node -e "
              const fs = require('fs');
              const xml2js = require('xml2js');
              
              const xmlPath = 'test-results/${{ matrix.test-suite }}/junit.xml';
              if (fs.existsSync(xmlPath)) {
                const xmlContent = fs.readFileSync(xmlPath, 'utf8');
                xml2js.parseString(xmlContent, (err, result) => {
                  if (err) {
                    console.log('Failed to parse test results');
                    return;
                  }
                  
                  const testSuite = result.testsuites?.testsuite?.[0] || result.testsuite;
                  if (testSuite) {
                    const tests = parseInt(testSuite.$.tests || '0');
                    const failures = parseInt(testSuite.$.failures || '0');
                    const errors = parseInt(testSuite.$.errors || '0');
                    const time = parseFloat(testSuite.$.time || '0');
                    
                    console.log(\`📈 ${{ matrix.test-suite }} Test Results:\`);
                    console.log(\`  Total Tests: \${tests}\`);
                    console.log(\`  Passed: \${tests - failures - errors}\`);
                    console.log(\`  Failed: \${failures}\`);
                    console.log(\`  Errors: \${errors}\`);
                    console.log(\`  Duration: \${time}s\`);
                    
                    // Export for summary
                    console.log(\`TEST_SUITE_${{ matrix.test-suite }}_TOTAL=\${tests}\`);
                    console.log(\`TEST_SUITE_${{ matrix.test-suite }}_PASSED=\${tests - failures - errors}\`);
                    console.log(\`TEST_SUITE_${{ matrix.test-suite }}_FAILED=\${failures + errors}\`);
                    console.log(\`TEST_SUITE_${{ matrix.test-suite }}_DURATION=\${time}\`);
                  }
                });
              }
            " >> $GITHUB_ENV || echo "Failed to analyze results"
          else
            echo "❌ No test results found for ${{ matrix.test-suite }}"
            exit 1
          fi

      - name: Upload test artifacts - ${{ matrix.test-suite }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: marketplace-${{ matrix.test-suite }}-results-${{ github.run_number }}
          path: |
            apps/sim/test-results/${{ matrix.test-suite }}/
            apps/sim/test-artifacts/${{ matrix.test-suite }}/
            apps/sim/coverage/
          retention-days: 30

  marketplace-quality-gate:
    name: 🎯 Marketplace Quality Gate
    runs-on: ubuntu-latest
    needs: [marketplace-security-scan, marketplace-tests]
    if: always()
    
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Comprehensive quality assessment
        id: quality-gate
        run: |
          echo "🎯 Evaluating marketplace quality gate..."
          
          # Initialize counters
          TOTAL_TESTS=0
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          OVERALL_DURATION=0
          
          # Collect results from all test suites
          for suite in unit integration api workflow performance; do
            if [ -f "artifacts/marketplace-${suite}-results-${{ github.run_number }}/junit.xml" ]; then
              echo "📊 Processing ${suite} results..."
              # Results processing would go here in real implementation
            fi
          done
          
          # Calculate quality metrics
          PASS_RATE=0
          if [ $TOTAL_TESTS -gt 0 ]; then
            PASS_RATE=$((TOTAL_PASSED * 100 / TOTAL_TESTS))
          fi
          
          # Security score from previous job
          SECURITY_SCORE=${{ needs.marketplace-security-scan.outputs.risk-score }}
          SECURITY_PASSED="${{ needs.marketplace-security-scan.outputs.security-passed }}"
          
          # Overall quality score calculation
          QUALITY_SCORE=0
          if [ "$SECURITY_PASSED" = "true" ] && [ $PASS_RATE -ge 85 ]; then
            QUALITY_SCORE=$((((100 - SECURITY_SCORE) + PASS_RATE) / 2))
          fi
          
          echo "📈 Quality Gate Assessment:"
          echo "  Security: $SECURITY_PASSED (Risk Score: $SECURITY_SCORE/100)"
          echo "  Test Pass Rate: $PASS_RATE%"
          echo "  Overall Quality Score: $QUALITY_SCORE/100"
          
          # Determine if quality gate passes
          QUALITY_GATE_PASSED=false
          if [ "$SECURITY_PASSED" = "true" ] && [ $PASS_RATE -ge 85 ] && [ $QUALITY_SCORE -ge 80 ]; then
            QUALITY_GATE_PASSED=true
          fi
          
          echo "quality-passed=$QUALITY_GATE_PASSED" >> $GITHUB_OUTPUT
          echo "quality-score=$QUALITY_SCORE" >> $GITHUB_OUTPUT
          echo "pass-rate=$PASS_RATE" >> $GITHUB_OUTPUT
          
          if [ "$QUALITY_GATE_PASSED" = "true" ]; then
            echo "✅ MARKETPLACE QUALITY GATE PASSED"
            echo "🚀 Ready for deployment"
          else
            echo "❌ MARKETPLACE QUALITY GATE FAILED"
            echo "🛑 Deployment blocked - please address quality issues"
            exit 1
          fi

      - name: Generate deployment summary
        if: steps.quality-gate.outputs.quality-passed == 'true'
        run: |
          echo "📋 Generating deployment summary..."
          
          cat > deployment-summary.md << EOF
          # 🚀 Marketplace Deployment Summary
          
          ## Quality Gate Results ✅
          
          | Metric | Result | Status |
          |--------|--------|---------|
          | Security Scan | Risk Score: ${{ needs.marketplace-security-scan.outputs.risk-score }}/100 | ${{ needs.marketplace-security-scan.outputs.security-passed == 'true' && '✅ Passed' || '❌ Failed' }} |
          | Test Coverage | ${{ steps.quality-gate.outputs.pass-rate }}% | ${{ steps.quality-gate.outputs.pass-rate >= '85' && '✅ Passed' || '❌ Failed' }} |
          | Overall Quality | ${{ steps.quality-gate.outputs.quality-score }}/100 | ${{ steps.quality-gate.outputs.quality-passed == 'true' && '✅ Passed' || '❌ Failed' }} |
          
          ## Deployment Readiness
          - ✅ Security vulnerabilities addressed
          - ✅ All test suites passing
          - ✅ Quality thresholds met
          - ✅ Ready for production deployment
          
          **Deployment authorized for:** \`${{ github.ref_name }}\` branch
          **Generated:** \`$(date -u +"%Y-%m-%d %H:%M:%S UTC")\`
          EOF
          
          echo "📄 Deployment summary generated"

      - name: Upload quality gate report
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-quality-gate-${{ github.run_number }}
          path: |
            deployment-summary.md
            artifacts/
          retention-days: 90

  marketplace-deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: marketplace-quality-gate
    if: github.ref == 'refs/heads/staging' && needs.marketplace-quality-gate.outputs.quality-passed == 'true'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy marketplace features to staging
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
