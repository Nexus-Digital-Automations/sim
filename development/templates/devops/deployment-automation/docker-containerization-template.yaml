# Docker Containerization Template for Modern Web Applications
# Optimized for production deployment with security and performance best practices

apiVersion: sim.platform/v1
kind: DevOpsTemplate
metadata:
  name: docker-containerization
  version: "1.0.0"
  description: "Production-ready Docker containerization with multi-stage builds, security scanning, and optimization"
  category: deployment-automation
  technology: [docker, nodejs, security]
  complexity: intermediate
  estimatedTime: "30-45 minutes"

spec:
  variables:
    - name: APPLICATION_NAME
      description: "Name of your application"
      type: string
      required: true
      example: "sim-webapp"
    
    - name: NODE_VERSION
      description: "Node.js version to use"
      type: string
      default: "18-alpine"
      
    - name: PORT
      description: "Application port"
      type: number
      default: 3000
      
    - name: REGISTRY_URL
      description: "Container registry URL"
      type: string
      required: true
      example: "ghcr.io/company/app"
      
    - name: HEALTH_CHECK_PATH
      description: "Health check endpoint path"
      type: string
      default: "/api/health"

  files:
    - path: "Dockerfile"
      type: dockerfile
      description: "Multi-stage production-optimized Dockerfile"
      content: |
        # =================================
        # STAGE 1: Dependency Installation
        # =================================
        FROM node:{{NODE_VERSION}} AS deps
        
        # Set working directory
        WORKDIR /app
        
        # Install security updates and necessary packages
        RUN apk update && apk upgrade && \
            apk add --no-cache dumb-init && \
            rm -rf /var/cache/apk/*
        
        # Copy package files for dependency installation
        COPY package*.json ./
        COPY yarn.lock* ./
        
        # Install dependencies with security audit
        RUN if [ -f yarn.lock ]; then \
              yarn install --frozen-lockfile --production=false && \
              yarn audit --level moderate; \
            else \
              npm ci --include=dev && \
              npm audit --audit-level=moderate; \
            fi && \
            npm cache clean --force
        
        # =================================
        # STAGE 2: Build Application
        # =================================
        FROM node:{{NODE_VERSION}} AS builder
        
        WORKDIR /app
        
        # Copy dependencies from deps stage
        COPY --from=deps /app/node_modules ./node_modules
        COPY --from=deps /app/package*.json ./
        
        # Copy source code
        COPY . .
        
        # Build application
        RUN npm run build && \
            npm prune --production && \
            npm cache clean --force
        
        # =================================
        # STAGE 3: Production Runtime
        # =================================
        FROM node:{{NODE_VERSION}} AS runtime
        
        # Set environment variables
        ENV NODE_ENV=production \
            PORT={{PORT}} \
            USER_ID=1001 \
            GROUP_ID=1001
        
        # Install security updates
        RUN apk update && apk upgrade && \
            apk add --no-cache dumb-init && \
            rm -rf /var/cache/apk/*
        
        # Create non-root user for security
        RUN addgroup -g $GROUP_ID -S appgroup && \
            adduser -S appuser -u $USER_ID -G appgroup
        
        # Set working directory
        WORKDIR /app
        
        # Copy built application from builder stage
        COPY --from=builder --chown=appuser:appgroup /app/node_modules ./node_modules
        COPY --from=builder --chown=appuser:appgroup /app/package*.json ./
        COPY --from=builder --chown=appuser:appgroup /app/dist ./dist
        COPY --from=builder --chown=appuser:appgroup /app/public ./public
        
        # Set proper permissions
        RUN chown -R appuser:appgroup /app
        
        # Switch to non-root user
        USER appuser
        
        # Expose port
        EXPOSE {{PORT}}
        
        # Add health check
        HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
          CMD node healthcheck.js || exit 1
        
        # Use dumb-init to handle signals properly
        ENTRYPOINT ["dumb-init", "--"]
        
        # Start application
        CMD ["npm", "start"]

    - path: "healthcheck.js"
      type: script
      description: "Application health check script"
      content: |
        #!/usr/bin/env node
        /**
         * Health Check Script for Docker Container
         * 
         * This script performs comprehensive health checks to ensure the application
         * is running properly and ready to serve requests.
         * 
         * Features:
         * - HTTP endpoint health check
         * - Database connectivity check
         * - Memory usage monitoring
         * - Response time validation
         */
        
        const http = require('http');
        const process = require('process');
        
        const HEALTH_CHECK_URL = 'http://localhost:{{PORT}}{{HEALTH_CHECK_PATH}}';
        const TIMEOUT_MS = 5000;
        const MAX_MEMORY_USAGE_MB = 512;
        
        /**
         * Perform HTTP health check
         * @returns {Promise<boolean>} Health check result
         */
        function performHealthCheck() {
          return new Promise((resolve) => {
            const startTime = Date.now();
            
            const req = http.get(HEALTH_CHECK_URL, { timeout: TIMEOUT_MS }, (res) => {
              const responseTime = Date.now() - startTime;
              
              console.log(`Health check response: ${res.statusCode}, time: ${responseTime}ms`);
              
              if (res.statusCode === 200 && responseTime < TIMEOUT_MS) {
                resolve(true);
              } else {
                console.error(`Health check failed: status=${res.statusCode}, time=${responseTime}ms`);
                resolve(false);
              }
            });
            
            req.on('error', (error) => {
              console.error(`Health check error: ${error.message}`);
              resolve(false);
            });
            
            req.on('timeout', () => {
              console.error(`Health check timeout after ${TIMEOUT_MS}ms`);
              req.destroy();
              resolve(false);
            });
          });
        }
        
        /**
         * Check memory usage
         * @returns {boolean} Memory usage check result
         */
        function checkMemoryUsage() {
          const memUsage = process.memoryUsage();
          const rssInMB = memUsage.rss / (1024 * 1024);
          
          console.log(`Memory usage: ${rssInMB.toFixed(2)} MB`);
          
          if (rssInMB > MAX_MEMORY_USAGE_MB) {
            console.error(`Memory usage too high: ${rssInMB.toFixed(2)} MB > ${MAX_MEMORY_USAGE_MB} MB`);
            return false;
          }
          
          return true;
        }
        
        /**
         * Main health check execution
         */
        async function main() {
          console.log('Starting health check...');
          
          try {
            // Check memory usage
            const memoryOk = checkMemoryUsage();
            if (!memoryOk) {
              process.exit(1);
            }
            
            // Perform HTTP health check
            const httpOk = await performHealthCheck();
            if (!httpOk) {
              process.exit(1);
            }
            
            console.log('✅ Health check passed');
            process.exit(0);
            
          } catch (error) {
            console.error(`Health check failed: ${error.message}`);
            process.exit(1);
          }
        }
        
        // Execute health check
        main();

    - path: ".dockerignore"
      type: config
      description: "Docker ignore file to reduce image size"
      content: |
        # Docker ignore file - excludes files from Docker build context
        # Reduces build time and image size by excluding unnecessary files
        
        # Development files
        node_modules
        npm-debug.log*
        yarn-debug.log*
        yarn-error.log*
        .env.local
        .env.development.local
        .env.test.local
        .env.production.local
        
        # IDE files
        .vscode
        .idea
        *.swp
        *.swo
        *~
        
        # OS files
        .DS_Store
        Thumbs.db
        
        # Version control
        .git
        .gitignore
        
        # Documentation
        README.md
        CHANGELOG.md
        docs/
        
        # Test files
        **/*.test.js
        **/*.test.ts
        **/*.spec.js
        **/*.spec.ts
        test/
        tests/
        __tests__/
        coverage/
        .nyc_output
        
        # Build artifacts (exclude source build files, keep dist/)
        src/
        .next/
        out/
        build/
        .cache/
        
        # CI/CD files
        .github/
        .gitlab-ci.yml
        Jenkinsfile
        .travis.yml
        
        # Docker files (avoid recursive Docker builds)
        Dockerfile*
        docker-compose*
        .dockerignore
        
        # Logs
        logs
        *.log
        npm-debug.log*
        yarn-debug.log*
        yarn-error.log*
        lerna-debug.log*
        
        # Temporary files
        .tmp
        .temp
        *.tmp
        *.temp

    - path: "docker-compose.yml"
      type: config
      description: "Development Docker Compose configuration"
      content: |
        # Docker Compose for {{APPLICATION_NAME}}
        # Development environment with hot reload and debugging support
        
        version: '3.8'
        
        services:
          # Main application service
          app:
            build:
              context: .
              dockerfile: Dockerfile
              target: runtime
            container_name: {{APPLICATION_NAME}}-app
            ports:
              - "{{PORT}}:{{PORT}}"
            environment:
              - NODE_ENV=development
              - PORT={{PORT}}
              - DATABASE_URL=postgresql://postgres:password@postgres:5432/{{APPLICATION_NAME}}
              - REDIS_URL=redis://redis:6379
            volumes:
              - .:/app
              - /app/node_modules
            depends_on:
              postgres:
                condition: service_healthy
              redis:
                condition: service_healthy
            networks:
              - app-network
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "node", "healthcheck.js"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
        
          # PostgreSQL database
          postgres:
            image: postgres:15-alpine
            container_name: {{APPLICATION_NAME}}-postgres
            environment:
              - POSTGRES_DB={{APPLICATION_NAME}}
              - POSTGRES_USER=postgres
              - POSTGRES_PASSWORD=password
            ports:
              - "5432:5432"
            volumes:
              - postgres_data:/var/lib/postgresql/data
              - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
            networks:
              - app-network
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U postgres -d {{APPLICATION_NAME}}"]
              interval: 10s
              timeout: 5s
              retries: 5
        
          # Redis cache
          redis:
            image: redis:7-alpine
            container_name: {{APPLICATION_NAME}}-redis
            ports:
              - "6379:6379"
            volumes:
              - redis_data:/data
            networks:
              - app-network
            healthcheck:
              test: ["CMD", "redis-cli", "ping"]
              interval: 10s
              timeout: 5s
              retries: 5
        
          # Monitoring stack
          prometheus:
            image: prom/prometheus:latest
            container_name: {{APPLICATION_NAME}}-prometheus
            ports:
              - "9090:9090"
            volumes:
              - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
              - prometheus_data:/prometheus
            networks:
              - app-network
            command:
              - '--config.file=/etc/prometheus/prometheus.yml'
              - '--storage.tsdb.path=/prometheus'
              - '--web.console.libraries=/etc/prometheus/console_libraries'
              - '--web.console.templates=/etc/prometheus/consoles'
        
          grafana:
            image: grafana/grafana:latest
            container_name: {{APPLICATION_NAME}}-grafana
            ports:
              - "3001:3000"
            environment:
              - GF_SECURITY_ADMIN_PASSWORD=admin123
            volumes:
              - grafana_data:/var/lib/grafana
              - ./monitoring/grafana:/etc/grafana/provisioning
            networks:
              - app-network
        
        # Named volumes for data persistence
        volumes:
          postgres_data:
            driver: local
          redis_data:
            driver: local
          prometheus_data:
            driver: local
          grafana_data:
            driver: local
        
        # Custom network for service communication
        networks:
          app-network:
            driver: bridge

    - path: "docker-build.sh"
      type: script
      description: "Advanced Docker build script with optimization and security scanning"
      content: |
        #!/bin/bash
        
        # Advanced Docker Build Script for {{APPLICATION_NAME}}
        # Features: Multi-platform builds, security scanning, image optimization
        
        set -euo pipefail
        
        # =================================
        # CONFIGURATION VARIABLES
        # =================================
        
        readonly SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        readonly APPLICATION_NAME="{{APPLICATION_NAME}}"
        readonly REGISTRY_URL="{{REGISTRY_URL}}"
        readonly VERSION="${VERSION:-$(git rev-parse --short HEAD)}"
        readonly BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        
        # Build configuration
        readonly DOCKERFILE="${DOCKERFILE:-Dockerfile}"
        readonly PLATFORMS="${PLATFORMS:-linux/amd64,linux/arm64}"
        readonly CACHE_FROM="${CACHE_FROM:-${REGISTRY_URL}:cache}"
        
        # Security scanning
        readonly ENABLE_SECURITY_SCAN="${ENABLE_SECURITY_SCAN:-true}"
        readonly TRIVY_SEVERITY="${TRIVY_SEVERITY:-HIGH,CRITICAL}"
        
        # =================================
        # LOGGING FUNCTIONS
        # =================================
        
        log_info() {
            echo -e "\033[1;34m[INFO]\033[0m $*"
        }
        
        log_warn() {
            echo -e "\033[1;33m[WARN]\033[0m $*"
        }
        
        log_error() {
            echo -e "\033[1;31m[ERROR]\033[0m $*"
        }
        
        log_success() {
            echo -e "\033[1;32m[SUCCESS]\033[0m $*"
        }
        
        # =================================
        # UTILITY FUNCTIONS
        # =================================
        
        check_dependencies() {
            local deps=("docker" "git")
            
            if [[ "${ENABLE_SECURITY_SCAN}" == "true" ]]; then
                deps+=("trivy")
            fi
            
            for dep in "${deps[@]}"; do
                if ! command -v "${dep}" &> /dev/null; then
                    log_error "Required dependency '${dep}' not found"
                    exit 1
                fi
            done
        }
        
        setup_buildx() {
            log_info "Setting up Docker Buildx..."
            
            # Create builder instance if it doesn't exist
            if ! docker buildx inspect multiplatform-builder &> /dev/null; then
                docker buildx create --name multiplatform-builder --use --platform "${PLATFORMS}"
            else
                docker buildx use multiplatform-builder
            fi
            
            # Bootstrap builder
            docker buildx inspect --bootstrap
        }
        
        build_image() {
            log_info "Building Docker image..."
            log_info "  Application: ${APPLICATION_NAME}"
            log_info "  Version: ${VERSION}"
            log_info "  Platforms: ${PLATFORMS}"
            log_info "  Registry: ${REGISTRY_URL}"
            
            # Prepare build arguments
            local build_args=(
                "--file" "${DOCKERFILE}"
                "--platform" "${PLATFORMS}"
                "--tag" "${REGISTRY_URL}:${VERSION}"
                "--tag" "${REGISTRY_URL}:latest"
                "--build-arg" "BUILD_DATE=${BUILD_DATE}"
                "--build-arg" "VERSION=${VERSION}"
                "--build-arg" "VCS_REF=$(git rev-parse HEAD)"
                "--cache-from" "type=registry,ref=${CACHE_FROM}"
                "--cache-to" "type=registry,ref=${CACHE_FROM},mode=max"
                "--metadata-file" "build-metadata.json"
            )
            
            # Add push flag if in CI environment
            if [[ "${CI:-false}" == "true" ]]; then
                build_args+=("--push")
            else
                build_args+=("--load")
            fi
            
            # Execute build
            docker buildx build "${build_args[@]}" .
            
            log_success "Docker image built successfully"
        }
        
        scan_security() {
            if [[ "${ENABLE_SECURITY_SCAN}" != "true" ]]; then
                log_info "Security scanning disabled"
                return 0
            fi
            
            log_info "Scanning image for security vulnerabilities..."
            
            local image_ref="${REGISTRY_URL}:${VERSION}"
            
            # Run Trivy security scan
            if trivy image \
                --format table \
                --severity "${TRIVY_SEVERITY}" \
                --exit-code 1 \
                --no-progress \
                "${image_ref}"; then
                log_success "Security scan passed"
            else
                log_error "Security vulnerabilities found"
                
                # Generate detailed report
                trivy image \
                    --format json \
                    --output "security-report.json" \
                    "${image_ref}"
                
                log_info "Detailed security report saved to security-report.json"
                return 1
            fi
        }
        
        analyze_image() {
            log_info "Analyzing image size and layers..."
            
            local image_ref="${REGISTRY_URL}:${VERSION}"
            
            # Get image information
            docker images "${image_ref}" --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"
            
            # Analyze layers (if dive is available)
            if command -v dive &> /dev/null; then
                log_info "Running dive analysis..."
                dive "${image_ref}" --ci
            fi
        }
        
        cleanup() {
            log_info "Cleaning up build artifacts..."
            
            # Remove build metadata
            rm -f build-metadata.json
            
            # Prune build cache older than 24 hours
            docker buildx prune --filter until=24h --force
        }
        
        # =================================
        # MAIN EXECUTION
        # =================================
        
        main() {
            log_info "Starting advanced Docker build process..."
            
            # Pre-flight checks
            check_dependencies
            
            # Setup build environment
            setup_buildx
            
            # Execute build pipeline
            build_image
            
            # Security scanning
            if ! scan_security; then
                log_error "Build failed security scan"
                exit 1
            fi
            
            # Image analysis
            analyze_image
            
            # Cleanup
            cleanup
            
            log_success "Build process completed successfully!"
            log_info "Image: ${REGISTRY_URL}:${VERSION}"
            log_info "Latest: ${REGISTRY_URL}:latest"
        }
        
        # Trap cleanup on exit
        trap cleanup EXIT
        
        # Execute main function
        main "$@"

  documentation:
    title: "Docker Containerization Template"
    overview: |
      This template provides a production-ready Docker containerization solution with multi-stage builds, 
      security best practices, and comprehensive monitoring integration. It's optimized for modern web 
      applications and includes automated security scanning and image optimization.
    
    features:
      - Multi-stage Docker build for optimal image size
      - Security-first approach with non-root user and vulnerability scanning
      - Health checks and monitoring integration
      - Development environment with Docker Compose
      - Automated build script with cross-platform support
      - Comprehensive logging and error handling
    
    prerequisites:
      - Docker 20.10+ with BuildKit enabled
      - Git for version control
      - Trivy for security scanning (optional)
      - Node.js application with package.json
    
    quick_start: |
      1. Customize the template variables for your application
      2. Place the template files in your project root
      3. Run the build script: `./docker-build.sh`
      4. For development: `docker-compose up -d`
    
    best_practices:
      - Use multi-stage builds to minimize image size
      - Run containers as non-root user for security
      - Implement comprehensive health checks
      - Use .dockerignore to exclude unnecessary files
      - Enable BuildKit for improved build performance
      - Regularly update base images for security patches
    
    security_considerations:
      - Container runs as non-root user (UID 1001)
      - Automatic security vulnerability scanning with Trivy
      - Minimal base image (Alpine Linux)
      - No sensitive information in Docker layers
      - Health check endpoints should not expose sensitive data
    
    troubleshooting:
      - If build fails: Check Docker BuildKit is enabled
      - If health check fails: Verify application starts correctly
      - If security scan fails: Update dependencies and base image
      - For permission issues: Ensure proper ownership in Dockerfile

