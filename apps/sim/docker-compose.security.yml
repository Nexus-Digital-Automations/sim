# Enterprise Security Docker Compose Configuration
# 
# Comprehensive security infrastructure for Sim code execution with:
# - Multi-layer container security and isolation
# - Resource limits and monitoring
# - Network security and traffic analysis
# - Comprehensive logging and audit trails
# - Performance optimization and scaling
#
# Security Features:
# - Defense in depth with multiple security layers
# - Zero-trust network architecture
# - Comprehensive resource monitoring
# - Automated threat detection and response
# - Enterprise-grade audit logging
#
# Author: Claude Development Agent
# Created: September 3, 2025

version: '3.8'

services:
  # JavaScript Secure Execution Environment
  javascript-sandbox:
    build:
      context: ./docker/javascript-sandbox
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20"
        SECURITY_LEVEL: "maximum"
    container_name: sim-js-sandbox-${INSTANCE_ID:-001}
    hostname: js-sandbox-${INSTANCE_ID:-001}
    
    # Security Configuration
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined  # Allows for custom seccomp profiles
      - apparmor:unconfined  # Custom AppArmor profile
    
    # Capability Management
    cap_drop:
      - ALL
    cap_add:
      - CHOWN      # File ownership changes (limited)
      - SETUID     # User ID changes (limited)
      - SETGID     # Group ID changes (limited)
    
    # Filesystem Security
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/tmp:noexec,nosuid,size=50m
      - /sandbox/workspace:exec,suid,size=200m
    volumes:
      - type: bind
        source: /dev/null
        target: /sandbox/logs/access.log
        read_only: false
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    mem_limit: 512m
    memswap_limit: 512m  # No swap
    cpus: '1.0'
    
    # Process Limits
    pids_limit: 100
    ulimits:
      nproc: 100
      nofile:
        soft: 100
        hard: 100
      core: 0  # No core dumps
    
    # Network Security
    networks:
      - sim-secure-network
    dns:
      - 1.1.1.1
      - 8.8.8.8
    
    # Environment Variables
    environment:
      - NODE_ENV=production
      - EXECUTION_TIMEOUT=30000
      - MEMORY_LIMIT=256MB
      - ENABLE_SECURITY_MONITORING=true
      - SECURITY_LEVEL=maximum
      - AUDIT_LOGGING=true
      - CONTAINER_ID=js-sandbox-${INSTANCE_ID:-001}
    
    # Health Check
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart Policy
    restart: unless-stopped
    
    # Logging Configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service,security,sandbox"
    
    labels:
      - "traefik.enable=false"
      - "security.scan=enabled"
      - "security.level=maximum"
      - "service.type=sandbox"
      - "monitoring.enabled=true"

  # Python Secure Execution Environment
  python-sandbox:
    build:
      context: ./docker/python-sandbox
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
        SECURITY_LEVEL: "maximum"
    container_name: sim-python-sandbox-${INSTANCE_ID:-001}
    hostname: python-sandbox-${INSTANCE_ID:-001}
    
    # Security Configuration
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
      - apparmor:unconfined
    
    # Capability Management
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    
    # Filesystem Security
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /var/tmp:noexec,nosuid,size=100m
      - /sandbox/workspace:exec,suid,size=500m
      - /sandbox/tmp:exec,suid,size=200m
    
    # Resource Limits (Higher for data science workloads)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
    mem_limit: 1024m
    memswap_limit: 1024m  # No swap
    cpus: '2.0'
    
    # Process Limits
    pids_limit: 200
    ulimits:
      nproc: 200
      nofile:
        soft: 200
        hard: 200
      core: 0
    
    # Network Security
    networks:
      - sim-secure-network
    dns:
      - 1.1.1.1
      - 8.8.8.8
    
    # Environment Variables
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONHASHSEED=random
      - EXECUTION_TIMEOUT=60000
      - MEMORY_LIMIT=512MB
      - ENABLE_SECURITY_MONITORING=true
      - SECURITY_LEVEL=maximum
      - PYTHON_SECURITY_MODE=maximum
      - AUDIT_LOGGING=true
      - CONTAINER_ID=python-sandbox-${INSTANCE_ID:-001}
    
    # Health Check
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Restart Policy
    restart: unless-stopped
    
    # Logging Configuration
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service,security,sandbox,python"
    
    labels:
      - "traefik.enable=false"
      - "security.scan=enabled"
      - "security.level=maximum"
      - "service.type=sandbox"
      - "monitoring.enabled=true"

  # Security Monitoring Service
  security-monitor:
    image: alpine:latest
    container_name: sim-security-monitor-${INSTANCE_ID:-001}
    hostname: security-monitor-${INSTANCE_ID:-001}
    
    # Security Configuration
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW     # For network monitoring
      - SYS_PTRACE  # For process monitoring
    
    # Minimal resource requirements
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    mem_limit: 256m
    cpus: '0.5'
    
    # Network access for monitoring
    networks:
      - sim-secure-network
      - sim-monitoring-network
    
    # Persistent storage for logs and analysis
    volumes:
      - security-logs:/var/log/security:rw
      - security-data:/var/lib/security:rw
    
    # Environment Configuration
    environment:
      - MONITORING_LEVEL=comprehensive
      - LOG_LEVEL=INFO
      - ALERT_THRESHOLD=50
      - AUDIT_RETENTION_DAYS=90
      - REAL_TIME_ANALYSIS=true
      - THREAT_DETECTION=enabled
    
    # Install monitoring tools
    command: |
      sh -c '
        apk add --no-cache curl jq htop iftop tcpdump &&
        echo "Security monitoring active..." &&
        while true; do
          echo "[MONITOR] $(date): Security scan in progress..."
          sleep 30
        done
      '
    
    # Health Check
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep -v grep | grep -q security || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    
    restart: unless-stopped
    
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
        labels: "security,monitoring,audit"
    
    labels:
      - "security.service=monitor"
      - "monitoring.type=security"

  # Network Traffic Analyzer
  network-analyzer:
    image: alpine:latest
    container_name: sim-network-analyzer-${INSTANCE_ID:-001}
    hostname: network-analyzer-${INSTANCE_ID:-001}
    
    # Network monitoring capabilities
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    mem_limit: 128m
    cpus: '0.3'
    
    # Network access
    networks:
      - sim-secure-network
      - sim-monitoring-network
    
    # Network analysis storage
    volumes:
      - network-logs:/var/log/network:rw
    
    # Environment
    environment:
      - ANALYSIS_MODE=real-time
      - THREAT_DETECTION=enabled
      - LOG_SUSPICIOUS_TRAFFIC=true
    
    # Network monitoring command
    command: |
      sh -c '
        apk add --no-cache tcpdump netstat-nat ss &&
        echo "Network analysis active..." &&
        while true; do
          echo "[NETWORK] $(date): Analyzing traffic patterns..."
          ss -tuln > /var/log/network/connections.log 2>/dev/null || true
          sleep 10
        done
      '
    
    healthcheck:
      test: ["CMD", "pgrep", "-f", "network"]
      interval: 30s
      timeout: 5s
      retries: 3
    
    restart: unless-stopped
    
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# Network Configuration
networks:
  # Secure network for sandbox containers
  sim-secure-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "sim-secure0"
      com.docker.network.bridge.enable_ip_masquerade: "false"
      com.docker.network.bridge.enable_icc: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
    labels:
      - "security.network=secure"
      - "isolation.level=maximum"
  
  # Monitoring network (separate from secure network)
  sim-monitoring-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "sim-monitor0"
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1
    labels:
      - "security.network=monitoring"

# Persistent Storage
volumes:
  # Security logs and audit trails
  security-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/security
    labels:
      - "security.data=audit-logs"
      - "retention.days=90"
  
  # Security analysis data
  security-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/security
    labels:
      - "security.data=analysis"
  
  # Network analysis logs
  network-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/network
    labels:
      - "security.data=network-logs"

# Global Configuration
x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  restart: unless-stopped

x-logging-defaults: &logging-defaults
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
      labels: "security,sim"